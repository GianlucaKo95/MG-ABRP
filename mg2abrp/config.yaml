name: "MG to ABRP Bridge"
version: "1.0.0"
slug: "mg2abrp"
description: "Sendet SOC/Ladezustand deines MG (via iSMART/SAIC) live an A Better Route Planner"
url: "https://github.com/GianlucaKo95/mg-abrp-addon"
image: "ghcr.io/gianlucako95/mg2abrp"
arch:
  - aarch64
  - amd64
init: false
startup: services
boot: auto

options:
  saic_username: ""
  saic_password: ""
  saic_phone_country_code: ""
  saic_region: "eu"
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  ha_discovery: true
  abrp_vin: ""
  abrp_token: ""
  abrp_api_key: ""
  log_level: "info"

schema:
  saic_username: str
  saic_password: password
  saic_phone_country_code: str?
  saic_region: list(eu|au|tr)
  mqtt_host: str
  mqtt_port: port
  mqtt_username: str?
  mqtt_password: password?
  ha_discovery: bool
  abrp_vin: str
  abrp_token: str
  abrp_api_key: str?
  log_level: list(debug|info|warning|error|critical)
